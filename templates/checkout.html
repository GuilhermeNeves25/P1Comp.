<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Finalizar Compra</h2>
    <div class="card p-4 mt-3">
        <h4>{{ produto.Marca }} {{ produto.Modelo }} - R$ {{ produto.Valor }}</h4>
        <form action="/checkout/{{ produto.RowKey }}" method="POST">
            <label>Selecione o Cliente:</label>
            <select name="cliente_id" class="form-control mb-3" required>
                <option value="">Escolha...</option>
                {% for c in clientes %}<option value="{{ c.RowKey }}">{{ c.Nome }}</option>{% endfor %}
            </select>
            <label>Pagamento:</label>
            <select name="pagamento" class="form-control mb-3">
                <option value="Cartão">Cartão</option><option value="Pix">Pix</option>
            </select>
            <label>Entrega:</label>
            <select name="entrega" class="form-control mb-3">
                <option value="Correios">Correios</option><option value="Retirada">Retirada</option>
            </select>
            <button class="btn btn-success w-100">Confirmar</button>
            <a href="/" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
    </div>
</body>
</html>
